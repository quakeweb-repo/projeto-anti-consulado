<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Background Check Pro - Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=/">
    <script>
      window.location.href = "/";
    </script>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff41;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-size: 16px;
        }
        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #00ff41;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <span>Redirecting to Background Check Pro...</span>
    </div>
</body>
</html>
