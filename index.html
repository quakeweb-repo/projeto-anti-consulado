<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Check Pro - Sistema Profissional de Verificação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #0a0a0a;
            font-family: 'JetBrains Mono', monospace;
            color: #00ff41;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        .terminal-header {
            background: #1a1a1a;
            border: 2px solid #00ff41;
            border-bottom: none;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .terminal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }
        
        .terminal-title {
            flex: 1;
            text-align: center;
            font-weight: 600;
            color: #00ff41;
            font-size: 14px;
        }
        
        .main-container {
            background: #1a1a1a;
            border: 2px solid #00ff41;
            border-top: none;
            min-height: 100vh;
            padding: 30px;
        }
        
        .search-section {
            background: #0f0f0f;
            border: 2px solid #00ff41;
            padding: 30px;
            margin-bottom: 30px;
            transform: rotate(-0.5deg);
        }
        
        .search-title {
            font-size: 24px;
            font-weight: 700;
            color: #00ff41;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .search-input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .search-input {
            flex: 1;
            background: #0a0a0a;
            border: 2px solid #00ff41;
            color: #00ff41;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            text-transform: uppercase;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #ff0080;
            box-shadow: 0 0 10px rgba(255, 0, 128, 0.3);
        }
        
        .search-type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .type-btn {
            background: #0a0a0a;
            border: 2px solid #00ff41;
            color: #00ff41;
            padding: 10px 20px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        
        .type-btn:hover, .type-btn.active {
            background: #00ff41;
            color: #0a0a0a;
            transform: translateX(-2px);
        }
        
        .search-btn {
            background: #00ff41;
            color: #0a0a0a;
            border: 2px solid #00ff41;
            padding: 15px 30px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .search-btn:hover {
            background: #ff0080;
            border-color: #ff0080;
            transform: translateX(-2px);
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .result-card {
            background: #0f0f0f;
            border: 2px solid #00ff41;
            padding: 25px;
            transform: rotate(0.5deg);
            transition: all 0.2s ease;
        }
        
        .result-card:hover {
            transform: rotate(0.5deg) translateX(-3px);
            border-color: #ff0080;
            box-shadow: 4px 4px 0px #ff0080;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #00ff41;
        }
        
        .card-icon {
            width: 40px;
            height: 40px;
            background: #0a0a0a;
            border: 2px solid #00ff41;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            color: #00ff41;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: #00ff41;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .status-badge {
            background: #0a0a0a;
            color: #00ff41;
            padding: 4px 12px;
            border: 1px solid #00ff41;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            margin-left: auto;
        }
        
        .status-high-risk {
            border-color: #ff0080;
            color: #ff0080;
        }
        
        .status-warning {
            border-color: #ffbd2e;
            color: #ffbd2e;
        }
        
        .status-clear {
            border-color: #27c93f;
            color: #27c93f;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .info-value {
            color: #00ff41;
            font-size: 12px;
            font-weight: 600;
        }
        
        .risk-section {
            background: #0f0f0f;
            border: 2px solid #ff0080;
            padding: 30px;
            margin-bottom: 30px;
            transform: rotate(0.5deg);
        }
        
        .risk-title {
            font-size: 20px;
            font-weight: 700;
            color: #ff0080;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .risk-meter {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .risk-bar {
            flex: 1;
            height: 30px;
            background: #0a0a0a;
            border: 2px solid #ff0080;
            position: relative;
            overflow: hidden;
        }
        
        .risk-fill {
            height: 100%;
            background: linear-gradient(90deg, #27c93f 0%, #ffbd2e 50%, #ff0080 100%);
            width: 75%;
            transition: width 1s ease;
        }
        
        .risk-percentage {
            font-size: 24px;
            font-weight: 700;
            color: #ff0080;
            min-width: 60px;
        }
        
        .alert-list {
            list-style: none;
            padding: 0;
        }
        
        .alert-item {
            background: #0a0a0a;
            border-left: 4px solid #ff0080;
            padding: 15px;
            margin-bottom: 10px;
            font-size: 12px;
        }
        
        .alert-high {
            border-left-color: #ff0080;
        }
        
        .alert-medium {
            border-left-color: #ffbd2e;
        }
        
        .alert-low {
            border-left-color: #27c93f;
        }
        
        .timeline-section {
            background: #0f0f0f;
            border: 2px solid #00ff41;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .timeline-title {
            font-size: 20px;
            font-weight: 700;
            color: #00ff41;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .timeline-item {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 9px;
            top: 30px;
            height: calc(100% + 20px);
            width: 2px;
            background: #00ff41;
        }
        
        .timeline-item:last-child::before {
            display: none;
        }
        
        .timeline-dot {
            width: 20px;
            height: 20px;
            background: #00ff41;
            border: 2px solid #0a0a0a;
            border-radius: 50%;
            margin-top: 5px;
        }
        
        .timeline-content {
            flex: 1;
            background: #0a0a0a;
            padding: 15px;
            border: 1px solid #333;
        }
        
        .timeline-date {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .timeline-text {
            color: #00ff41;
            font-size: 12px;
        }
        
        .loading-state {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .loading-spinner {
            border: 3px solid #00ff41;
            border-top: 3px solid transparent;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #ff5f56;
            color: white;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        
        .results-section {
            background: #1a1a1a;
            border: 1px solid #00ff41;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .loading-skeleton {
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
            height: 20px;
            margin: 10px 0;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .terminal-cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #00ff41;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        /* Live Mining Styles */
        .progress-section {
            background: #0f0f0f;
            border: 2px solid #00ff41;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .progress-bar-container {
            background: #0a0a0a;
            border: 2px solid #00ff41;
            height: 30px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00ff41, #ff0080);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a0a0a;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #00ff41;
        }
        
        .loading-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .loading-skeletons {
            margin-top: 15px;
        }
        
        .loading-skeleton {
            height: 15px;
            background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            margin-bottom: 10px;
            border-radius: 2px;
        }
        
        .live-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #00ff41;
            border-radius: 0;
            font-size: 12px;
            color: #00ff41;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff41;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .export-section {
            background: #0f0f0f;
            border: 2px solid #00ff41;
            padding: 30px;
            margin-bottom: 30px;
            transform: rotate(-0.5deg);
        }
        
        .export-title {
            font-size: 18px;
            font-weight: 700;
            color: #00ff41;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .export-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .export-btn {
            background: #0a0a0a;
            border: 2px solid #00ff41;
            color: #00ff41;
            padding: 12px 20px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .export-btn:hover {
            background: #00ff41;
            color: #0a0a0a;
            transform: translateX(-2px);
        }
        
        .error-container {
            background: #0f0f0f;
            border: 2px solid #ff0080;
            padding: 40px;
            text-align: center;
            transform: rotate(0.5deg);
        }
        
        .error-icon {
            font-size: 48px;
            color: #ff0080;
            margin-bottom: 20px;
        }
        
        .error-message {
            color: #ff0080;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .retry-btn {
            background: #ff0080;
            color: #0a0a0a;
            border: 2px solid #ff0080;
            padding: 12px 24px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        
        .retry-btn:hover {
            background: #0a0a0a;
            color: #ff0080;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1a1a1a;
            border: 2px solid #00ff41;
            padding: 15px 20px;
            z-index: 10000;
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }
        
        .notification-success {
            border-color: #27c93f;
            color: #27c93f;
        }
        
        .notification-error {
            border-color: #ff0080;
            color: #ff0080;
        }
        
        .notification-warning {
            border-color: #ffbd2e;
            color: #ffbd2e;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .notification-content {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .notification-close {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            padding: 0;
            margin-left: 10px;
        }
        
        .validation-results {
            margin-top: 15px;
            padding: 15px;
            background: #0a0a0a;
            border: 1px solid #00ff41;
            font-size: 12px;
        }
        
        .validation-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }
        
        .validation-item:last-child {
            border-bottom: none;
        }
        
        .validation-valid {
            color: #27c93f;
        }
        
        .validation-invalid {
            color: #ff0080;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1a1a1a;
            border: 2px solid #00ff41;
            padding: 40px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .close-modal {
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #00ff41;
        }
        
        .close-modal:hover {
            color: #ff0080;
        }
        
        /* Civil Registry Styles */
        .source-badge {
            background: #0a0a0a;
            color: #00ff41;
            padding: 2px 8px;
            border: 1px solid #00ff41;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
        }
        
        .document-item {
            border: 1px solid #333;
            padding: 10px;
            margin-bottom: 10px;
            background: #0a0a0a;
        }
        
        .relationship-item {
            border-left: 3px solid #00ff41;
            padding: 8px 12px;
            margin-bottom: 8px;
            background: #0a0a0a;
        }
        
        .risk-baixo {
            color: #27c93f;
            border-color: #27c93f;
        }
        
        .risk-medio {
            color: #ffbd2e;
            border-color: #ffbd2e;
        }
        
        .risk-alto {
            color: #ff0080;
            border-color: #ff0080;
        }
        
        .ml-analysis-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 2px solid #00ff41;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .ml-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .ml-metric {
            background: #0a0a0a;
            padding: 15px;
            border: 1px solid #333;
            text-align: center;
        }
        
        .ml-metric-value {
            font-size: 24px;
            font-weight: 700;
            color: #00ff41;
            margin-bottom: 5px;
        }
        
        .ml-metric-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }
        
        .training-progress {
            background: #0a0a0a;
            border: 2px solid #00ff41;
            padding: 20px;
            margin: 20px 0;
        }
        
        .progress-bar-container {
            background: #1a1a1a;
            border: 1px solid #333;
            height: 20px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff41, #ff0080);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a0a0a;
            font-weight: 700;
            font-size: 12px;
        }
        
        .model-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .model-stat {
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 15px;
        }
        
        .model-stat-title {
            color: #00ff41;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .model-stat-value {
            color: #fff;
            font-size: 18px;
        }
        
        .pagination-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .pagination-btn {
            background: #0a0a0a;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .pagination-btn:hover {
            background: #00ff41;
            color: #0a0a0a;
        }
        
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination-info {
            color: #888;
            padding: 8px 16px;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>
    <!-- TERMINAL HEADER -->
    <div class="terminal-header">
        <div class="terminal-dot dot-red"></div>
        <div class="terminal-dot dot-yellow"></div>
        <div class="terminal-dot dot-green"></div>
        <div class="terminal-title">BACKGROUND CHECK PRO v2.0 - DEEP VERIFICATION SYSTEM</div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="main-container">
        <!-- SEARCH SECTION -->
        <div class="search-section">
            <h1 class="search-title">
                <i class="fas fa-search"></i> Deep Background Check
            </h1>
            
            <div class="search-type-selector">
                <button class="type-btn active" data-type="person" onclick="setSearchType('person')">
                    <i class="fas fa-user"></i> Pessoa
                </button>
                <button class="type-btn" data-type="company" onclick="setSearchType('company')">
                    <i class="fas fa-building"></i> Empresa
                </button>
                <button class="type-btn" data-type="cpf" onclick="setSearchType('cpf')">
                    <i class="fas fa-id-card"></i> CPF/CNPJ
                </button>
                <button class="type-btn" data-type="phone" onclick="setSearchType('phone')">
                    <i class="fas fa-phone"></i> Telefone
                </button>
                <button class="type-btn" data-type="email" onclick="setSearchType('email')">
                    <i class="fas fa-envelope"></i> E-mail
                </button>
                <button class="type-btn" data-type="instagram" onclick="setSearchType('instagram')">
                    <i class="fab fa-instagram"></i> Instagram
                </button>
            </div>
            
            <form id="searchForm">
                <div class="search-input-group">
                    <input type="text" class="search-input" id="searchInput" placeholder="Digite nome, CPF, CNPJ, telefone, e-mail ou @instagram..." required>
                    <button type="submit" class="search-btn">
                        <i class="fas fa-search"></i> VERIFICAR
                    </button>
                </div>
                
                <div class="search-input-group">
                    <select class="search-input" id="depthSelect">
                        <option value="basic">Verificação Básica</option>
                        <option value="standard" selected>Verificação Padrão</option>
                        <option value="deep">Verificação Profunda</option>
                        <option value="comprehensive">Verificação Abrangente</option>
                    </select>
                    <select class="search-input" id="stateSelect">
                        <option value="">Todos os estados</option>
                        <option value="SP">São Paulo</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="BA">Bahia</option>
                    </select>

        let currentSearchType = 'person';
        
        function setSearchType(type) {
            currentSearchType = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update placeholder based on type
            const input = document.getElementById('searchInput');
            const placeholders = {
                'person': 'Digite nome completo da pessoa...',
                'company': 'Digite razão social ou CNPJ...',
                'cpf': 'Digite CPF ou CNPJ...',
                'phone': 'Digite número de telefone...',
                'email': 'Digite endereço de e-mail...'
            };
            input.placeholder = placeholders[type];
        }
        
        async function performDeepCheck() {
            const query = document.getElementById('searchInput').value;
            const depth = document.getElementById('depthSelect').value;
            const state = document.getElementById('stateSelect').value;
            
            if (!query) {
                alert('Por favor, digite um termo para pesquisa');
                return;
            }
            
            // Show loading state
            showLoadingState();
            
            try {
                // Perform API call based on search type
                let endpoint;
                switch (currentSearchType) {
                    case 'person':
                        endpoint = `/api/mining/pessoa/${encodeURIComponent(query)}`;
                        break;
                    case 'company':
                        endpoint = `/api/mining/empresa/${encodeURIComponent(query)}`;
                        break;
                    case 'cpf':
                        endpoint = `/api/cpf/generate/${encodeURIComponent(query)}`;
                        break;
                    default:
                        endpoint = `/api/mining/enriched/${encodeURIComponent(query)}?type=${currentSearchType}`;
                }
                
                const response = await fetch(endpoint);
                const data = await response.json();
                
                // Process and display results
                displayResults(data, depth);
                
            } catch (error) {
                console.error('Error performing search:', error);
                showErrorState();
            }
        }
        
        function showLoadingState() {
            const resultsGrid = document.getElementById('resultsGrid');
            resultsGrid.innerHTML = `
                <div class="result-card">
                    <div class="card-header">
                        <div class="card-icon"><i class="fas fa-spinner fa-spin"></i></div>
                        <div class="card-title">Processando...</div>
                    </div>
                    <div class="loading-skeleton"></div>
                    <div class="loading-skeleton"></div>
                    <div class="loading-skeleton"></div>
                </div>
            `;
            
            // Show risk section with loading
            document.getElementById('riskSection').style.display = 'block';
            document.getElementById('riskFill').style.width = '0%';
            document.getElementById('riskPercentage').textContent = '0%';
            document.getElementById('alertList').innerHTML = '<li class="alert-item">Analisando riscos...</li>';
        }
        
        function displayResults(data, depth) {
            const resultsGrid = document.getElementById('resultsGrid');
            const riskSection = document.getElementById('riskSection');
            const timelineSection = document.getElementById('timelineSection');
            
            // Generate result cards based on data
            const cards = generateResultCards(data, depth);
            resultsGrid.innerHTML = cards.join('');
            
            // Calculate and display risk assessment
            displayRiskAssessment(data);
            
            // Display timeline
            displayTimeline(data);
        }

        function displayRiskAssessment(data) {
            const riskSection = document.getElementById('riskSection');
            const riskFill = document.getElementById('riskFill');
            const riskPercentage = document.getElementById('riskPercentage');
            const alertList = document.getElementById('alertList');
            
            // Calculate mock risk score (0-100)
            const riskScore = Math.floor(Math.random() * 60) + 20; // 20-80 range
            
            // Animate risk meter
            setTimeout(() => {
                riskFill.style.width = riskScore + '%';
                riskPercentage.textContent = riskScore + '%';
            }, 500);
            
            // Generate alerts based on risk score
            const alerts = [];
            
            if (riskScore > 60) {
                alerts.push({
                    type: 'alert-high',
                    text: 'ALTO RISCO: Múltiplas restrições financeiras encontradas'
                });
            }
            
            if (riskScore > 40) {
                alerts.push({
                    type: 'alert-medium',
                    text: 'MÉDIO RISCO: Processos judiciais em andamento'
                });
            }
            
            alerts.push({
                type: 'alert-low',
                text: 'BAIXO RISCO: Histórico de crédito estável'
            });
            
            alertList.innerHTML = alerts.map(alert => 
                `<li class="alert-item ${alert.type}">${alert.text}</li>`
            ).join('');
            
            riskSection.style.display = 'block';
        }

            timelineSection.style.display = 'block';

        function generateMockCPF() {
            // Generate a mock CPF for demonstration
            const base = Math.floor(Math.random() * 1000000000).toString().padStart(9, '0');
            const dv1 = Math.floor(Math.random() * 10);
            const dv2 = Math.floor(Math.random() * 10);
            return `${base.substring(0, 3)}.${base.substring(3, 6)}.${base.substring(6, 9)}-${dv1}${dv2}`;
        }
        
        function showErrorState() {
