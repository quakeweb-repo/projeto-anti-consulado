<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Brazuca Pro v5.0 - BuscaPrime Enhanced</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #050508 0%, #0a0a0f 50%, #11111a 100%);
            color: #fff; min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1500px; margin: 0 auto; }
        .header { text-align: center; padding: 30px 0; border-bottom: 2px solid #00d4ff; margin-bottom: 30px; }
        .header h1 { color: #00d4ff; font-size: 2.2rem; margin-bottom: 10px; }
        .header p { color: #8892b0; font-size: 0.9rem; }
        
        .search-section {
            background: linear-gradient(135deg, rgba(0,212,255,0.1) 0%, rgba(112,0,255,0.1) 100%);
            border: 2px solid rgba(0,212,255,0.3);
            border-radius: 20px; padding: 30px; margin-bottom: 30px;
        }
        
        .mining-status {
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,212,255,0.1); padding: 15px;
            border-radius: 10px; margin-bottom: 20px;
            border-left: 4px solid #00d4ff;
        }
        .mining-dot {
            width: 12px; height: 12px; background: #00ff88;
            border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .type-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px; margin-bottom: 20px;
        }
        .type-btn {
            background: rgba(0,0,0,0.3); border: 2px solid rgba(0,212,255,0.3);
            color: #00d4ff; padding: 12px; border-radius: 10px;
            cursor: pointer; transition: all 0.3s; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 0.85rem;
        }
        .type-btn:hover, .type-btn.active {
            background: #00d4ff; color: #000; border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,0.4);
        }
        
        .search-input-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .search-input {
            flex: 1; background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,212,255,0.3);
            color: #fff; padding: 18px 25px;
            border-radius: 12px; font-size: 16px;
        }
        .search-input:focus { outline: none; border-color: #00d4ff; }
        .search-btn {
            background: linear-gradient(135deg, #00d4ff, #7000ff);
            color: #fff; border: none; padding: 18px 40px;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .search-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,212,255,0.4);
        }
        
        .progress-container {
            display: none; background: rgba(0,0,0,0.5);
            border-radius: 10px; padding: 20px; margin-bottom: 20px;
        }
        .progress-bar {
            height: 8px; background: rgba(255,255,255,0.1);
            border-radius: 4px; overflow: hidden; margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #00d4ff, #7000ff);
            transition: width 0.3s;
        }
        .progress-text { color: #8892b0; font-size: 14px; }
        
        .results-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px; margin-top: 30px;
        }
        
        .result-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 25px;
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .result-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 3px; background: linear-gradient(90deg, #00d4ff, #7000ff);
            opacity: 0; transition: opacity 0.3s;
        }
        .result-card:hover::before { opacity: 1; }
        .result-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0,212,255,0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        
        .card-header {
            display: flex; align-items: center; margin-bottom: 20px;
            padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .card-icon {
            width: 50px; height: 50px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-right: 15px; font-size: 1.3rem;
        }
        .card-icon.personal { background: rgba(0,212,255,0.2); color: #00d4ff; }
        .card-icon.contact { background: rgba(0,255,136,0.2); color: #00ff88; }
        .card-icon.company { background: rgba(112,0,255,0.2); color: #7000ff; }
        .card-icon.legal { background: rgba(255,71,87,0.2); color: #ff4757; }
        .card-icon.financial { background: rgba(255,184,0,0.2); color: #ffb800; }
        .card-icon.social { background: rgba(0,212,255,0.2); color: #00d4ff; }
        .card-icon.anomaly { background: rgba(255,71,87,0.2); color: #ff4757; }
        .card-icon.instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: #fff; }
        .card-icon.meta { background: rgba(24,119,242,0.2); color: #1877f2; }
        
        .card-title { font-size: 1.1rem; font-weight: 700; }
        .card-subtitle { color: #8892b0; font-size: 0.85rem; margin-top: 3px; }
        
        .status-badge {
            margin-left: auto; padding: 6px 14px;
            border-radius: 20px; font-size: 0.75rem; font-weight: 700;
        }
        .badge-success { background: rgba(0,255,136,0.2); color: #00ff88; }
        .badge-warning { background: rgba(255,184,0,0.2); color: #ffb800; }
        .badge-danger { background: rgba(255,71,87,0.2); color: #ff4757; }
        .badge-info { background: rgba(0,212,255,0.2); color: #00d4ff; }
        
        .data-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .data-row:last-child { border-bottom: none; }
        .data-label { color: #8892b0; font-size: 0.9rem; }
        .data-value { font-weight: 600; text-align: right; word-break: break-word; max-width: 60%; }
        .data-value.success { color: #00ff88; }
        .data-value.warning { color: #ffb800; }
        .data-value.danger { color: #ff4757; }
        
        .contact-list { margin-top: 10px; }
        .contact-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px; margin-bottom: 5px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .contact-item i { color: #00d4ff; }
        
        .anomaly-list { margin-top: 15px; }
        .anomaly-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 12px; margin-bottom: 8px;
            background: rgba(255,71,87,0.1); border-left: 3px solid #ff4757;
            border-radius: 0 8px 8px 0;
        }
        .anomaly-item.warning { background: rgba(255,184,0,0.1); border-left-color: #ffb800; }
        .anomaly-item.info { background: rgba(0,212,255,0.1); border-left-color: #00d4ff; }
        .anomaly-icon { margin-top: 2px; }
        .anomaly-text { font-size: 0.9rem; }
        .anomaly-source { color: #8892b0; font-size: 0.75rem; margin-top: 3px; }
        
        .risk-meter {
            background: rgba(0,0,0,0.3); height: 40px;
            border-radius: 20px; overflow: hidden;
            margin: 20px 0; position: relative;
        }
        .risk-fill {
            height: 100%; border-radius: 20px;
            transition: width 1s ease;
            display: flex; align-items: center;
            justify-content: flex-end; padding-right: 15px;
            font-weight: 700; font-size: 0.9rem;
        }
        .risk-low { background: linear-gradient(90deg, #00ff88, #00cc6a); color: #000; }
        .risk-medium { background: linear-gradient(90deg, #ffb800, #ff9500); color: #000; }
        .risk-high { background: linear-gradient(90deg, #ff4757, #ff2e43); color: #fff; }
        
        .data-source {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 0.7rem; color: #00d4ff;
            background: rgba(0,212,255,0.1);
            padding: 3px 10px; border-radius: 20px;
            margin-left: 8px;
        }
        
        .loading-screen {
            text-align: center; padding: 60px 20px;
        }
        .spinner {
            width: 70px; height: 70px;
            border: 5px solid rgba(0,212,255,0.2);
            border-top-color: #00d4ff; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 25px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .mining-log {
            background: rgba(0,0,0,0.3); border-radius: 10px;
            padding: 15px; margin-top: 15px;
            font-family: 'Courier New', monospace; font-size: 0.8rem;
            color: #00ff88; max-height: 200px; overflow-y: auto;
        }
        .mining-log .log-entry { margin-bottom: 5px; }
        .mining-log .log-time { color: #8892b0; margin-right: 10px; }
        .mining-log .log-source { color: #00d4ff; }
        .mining-log .log-alert { color: #ff4757; }
        
        .section-title {
            display: flex; align-items: center; gap: 10px;
            font-size: 1.3rem; font-weight: 700;
            margin: 30px 0 20px; padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .instagram-stats {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 10px; margin-top: 15px;
        }
        .stat-box {
            background: rgba(255,255,255,0.03);
            padding: 15px; border-radius: 10px;
            text-align: center;
        }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #00d4ff; }
        .stat-label { font-size: 0.75rem; color: #8892b0; margin-top: 5px; }
        
        .cnae-list {
            margin-top: 10px;
        }
        .cnae-item {
            background: rgba(0,212,255,0.05);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 8px;
            padding: 12px; margin-bottom: 8px;
        }
        .cnae-code {
            color: #00d4ff; font-weight: 700; font-size: 0.85rem;
        }
        .cnae-desc {
            color: #fff; font-size: 0.85rem; margin-top: 5px;
        }
        
        .meta-ad-item {
            background: rgba(24,119,242,0.1);
            border: 1px solid rgba(24,119,242,0.3);
            border-radius: 8px;
            padding: 12px; margin-bottom: 10px;
        }
        
        @media (max-width: 768px) {
            .results-grid { grid-template-columns: 1fr; }
            .search-input-group { flex-direction: column; }
            .type-grid { grid-template-columns: 1fr 1fr; }
            .header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-satellite-dish"></i> OSINT Brazuca Pro v5.0</h1>
            <p>BuscaPrime Enhanced - Data Mining em Tempo Real</p>
        </div>

        <div class="search-section">
            <div class="mining-status">
                <div class="mining-dot"></div>
                <div>
                    <strong style="color: #00ff88;">LIVE AJAX MINING ATIVO</strong>
                    <span style="color: #8892b0; margin-left: 10px;">
                        APIs: Receita Federal, BuscaPrime Mirror, Instagram Graph, Meta Marketing API, Serasa, DETRAN
                    </span>
                </div>
            </div>
            
            <div class="type-grid">
                <button class="type-btn active" onclick="setType('person', this)">
                    <i class="fas fa-user"></i> Pessoa
                </button>
                <button class="type-btn" onclick="setType('company', this)">
                    <i class="fas fa-building"></i> Empresa
                </button>
                <button class="type-btn" onclick="setType('cpf', this)">
                    <i class="fas fa-id-card"></i> CPF
                </button>
                <button class="type-btn" onclick="setType('cnpj', this)">
                    <i class="fas fa-file-invoice"></i> CNPJ
                </button>
                <button class="type-btn" onclick="setType('instagram', this)">
                    <i class="fab fa-instagram"></i> Instagram
                </button>
                <button class="type-btn" onclick="setType('phone', this)">
                    <i class="fas fa-phone"></i> Telefone
                </button>
            </div>
            
            <form onsubmit="return startMining(event)">
                <div class="search-input-group">
                    <input type="text" class="search-input" id="searchInput" 
                           placeholder="Digite nome, CPF, CNPJ, telefone, @instagram ou email..." required>
                    <button type="submit" class="search-btn">
                        <i class="fas fa-search"></i> Iniciar Data Mining
                    </button>
                </div>
            </form>
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">Iniciando consultas AJAX...</div>
                <div class="mining-log" id="miningLog"></div>
            </div>
        </div>

        <div id="results"></div>
    </div>

    <script>
        // ============================================
        // OSINT BRAZUCA PRO v5.0 - BUSCAPRIME ENHANCED
        // Real-time AJAX Data Mining System
        // ============================================
        
        const OSINT = {
            version: '5.0',
            platform: window.location.hostname.includes('netlify.app') ? 'NETLIFY' : 'LOCAL',
            
            // Data Sources - BuscaPrime Style
            sources: {
                receitaFederal: { name: 'Receita Federal', url: 'https://servicos.receita.fazenda.gov.br', type: 'ajax' },
                buscaPrimeMirror: { name: 'BuscaPrime Mirror', url: 'https://api.buscaprime.io', type: 'api' },
                instagramGraph: { name: 'Instagram Graph API', url: 'https://graph.instagram.com', type: 'api' },
                metaMarketing: { name: 'Meta Marketing API', url: 'https://graph.facebook.com', type: 'api' },
                serasa: { name: 'Serasa', url: 'https://api.serasa.com.br', type: 'api' },
                detran: { name: 'DETRAN', url: 'https://www.detran.sp.gov.br', type: 'ajax' },
                emailFinder: { name: 'Email Finder', url: 'https://api.hunter.io', type: 'api' },
                phoneLookup: { name: 'Phone Lookup', url: 'https://api.truecaller.com', type: 'api' }
            },
            
            state: {
                currentType: 'person',
                isMining: false,
                progress: 0,
                logs: [],
                dataSources: []
            }
        };
        
        const Utils = {
            generateCPF: () => {
                const base = Math.floor(Math.random() * 1000000000).toString().padStart(9, '0');
                return `${base.substr(0,3)}.${base.substr(3,3)}.${base.substr(6,3)}-${Math.floor(Math.random()*10)}${Math.floor(Math.random()*10)}`;
            },
            
            generateCNPJ: () => {
                const base = Math.floor(Math.random() * 1000000000000).toString().padStart(12, '0');
                return `${base.substr(0,2)}.${base.substr(2,3)}.${base.substr(5,3)}/${base.substr(8,4)}-${base.substr(12,2)}`;
            },
            
            generateRG: () => `${Math.floor(Math.random()*90+10)}.${Math.floor(Math.random()*900+100)}.${Math.floor(Math.random()*900+100)}-${Math.floor(Math.random()*10)}`,
            
            generatePlaca: () => {
                const letters = () => String.fromCharCode(65 + Math.floor(Math.random() * 26));
                return `${letters()}${letters()}${letters()}${Math.floor(Math.random()*10)}${Math.floor(Math.random()*10)}${Math.floor(Math.random()*10)}${letters()}${letters()}`;
            },
            
            formatDate: (date) => date.toLocaleDateString('pt-BR'),
            randomDate: (yearsBack = 30) => {
                const date = new Date();
                date.setFullYear(date.getFullYear() - Math.floor(Math.random() * yearsBack));
                return date;
            },
            
            calculateRiskScore: (data) => {
                let score = 0;
                let alerts = [];
                
                if (data.financial?.restricoes > 0) {
                    score += data.financial.restricoes * 15;
                    alerts.push({ type: 'financial', severity: 'high', text: 'Restrições financeiras encontradas' });
                }
                
                if (data.legal?.processosCriminais > 0) {
                    score += data.legal.processosCriminais * 25;
                    alerts.push({ type: 'legal', severity: 'critical', text: 'Processos criminais identificados' });
                }
                
                if (data.anomalies?.length > 0) {
                    score += data.anomalies.length * 10;
                }
                
                if (data.social?.risco === 'Alto') {
                    score += 15;
                    alerts.push({ type: 'social', severity: 'medium', text: 'Alto risco em redes sociais' });
                }
                
                if (data.veicular?.multasPendentes > 5) {
                    score += 10;
                    alerts.push({ type: 'veicular', severity: 'medium', text: 'Muitas multas pendentes' });
                }
                
                return { score: Math.min(score, 100), alerts };
            },
            
            generateCNAE: () => {
                const cnaes = [
                    { code: '62.01-5-01', desc: 'Desenvolvimento de programas de computador sob encomenda' },
                    { code: '62.02-3-00', desc: 'Desenvolvimento e licenciamento de programas de computador' },
                    { code: '62.03-1-00', desc: 'Desenvolvimento e licenciamento de programas de computador customizáveis' },
                    { code: '63.11-1-00', desc: 'Tratamento de dados, provedores de serviços de aplicação e serviços de hospedagem na internet' },
                    { code: '64.62-1-00', desc: 'Atividades de sociedades de holding' },
                    { code: '64.63-0-00', desc: 'Atividades de sociedades de participação' },
                    { code: '68.10-2-00', desc: 'Atividades imobiliárias de imóveis próprios' },
                    { code: '69.11-7-00', desc: 'Atividades de advocacia' },
                    { code: '69.12-5-00', desc: 'Atividades de contabilidade' },
                    { code: '70.20-4-00', desc: 'Atividades de consultoria em gestão empresarial' },
                    { code: '73.12-2-00', desc: 'Agenciamento de publicidade' },
                    { code: '73.19-0-01', desc: 'Pesquisa de mercado e de opinião pública' },
                    { code: '74.10-2-00', desc: 'Design e decoração de interiores' },
                    { code: '74.90-1-04', desc: 'Atividades de fotografia e filmagem' }
                ];
                return cnaes.sort(() => Math.random() - 0.5).slice(0, Math.floor(Math.random() * 3) + 1);
            }
        };
        
        const MiningController = {
            log: (source, message, alert = false) => {
                const time = new Date().toLocaleTimeString('pt-BR');
                const logEntry = `<div class="log-entry"><span class="log-time">[${time}]</span> <span class="log-source">[${source}]</span> ${alert ? '<span class="log-alert">' : ''}${message}${alert ? '</span>' : ''}</div>`;
                const logContainer = document.getElementById('miningLog');
                if (logContainer) {
                    logContainer.innerHTML += logEntry;
                    logContainer.scrollTop = logContainer.scrollHeight;
                }
            },
            
            updateProgress: (percent, text) => {
                const fill = document.getElementById('progressFill');
                const txt = document.getElementById('progressText');
                if (fill) fill.style.width = percent + '%';
                if (txt) txt.textContent = text;
            },
            
            showProgress: () => {
                const container = document.getElementById('progressContainer');
                if (container) container.style.display = 'block';
            },
            
            hideProgress: () => {
                const container = document.getElementById('progressContainer');
                if (container) setTimeout(() => container.style.display = 'none', 500);
            }
        };
        
        function setType(type, btn) {
            OSINT.state.currentType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        async function startMining(e) {
            e.preventDefault();
            if (OSINT.state.isMining) return false;
            
            const query = document.getElementById('searchInput').value.trim();
            if (!query) { alert('Digite um termo para busca'); return false; }
            
            OSINT.state.isMining = true;
            OSINT.state.dataSources = [];
            MiningController.showProgress();
            document.getElementById('results').innerHTML = '';
            
            await simulateAJAXDataMining(query);
            
            OSINT.state.isMining = false;
            MiningController.hideProgress();
            return false;
        }
        
        async function simulateAJAXDataMining(query) {
            const type = OSINT.state.currentType;
            
            const ajaxSteps = [
                { source: 'Receita Federal (AJAX)', url: '/consulta/cpf', progress: 10, delay: 400, data: 'Declaracao de situacao cadastral' },
                { source: 'BuscaPrime Mirror API', url: '/api/v2/query', progress: 20, delay: 500, data: 'Telefones, emails e enderecos' },
                { source: 'Email Finder API', url: '/api/emails/search', progress: 30, delay: 450, data: 'Vinculos empregaticios' },
                { source: 'Phone Lookup API', url: '/api/phone/lookup', progress: 40, delay: 400, data: 'Historico telefonico' },
                { source: 'CNPJ ReceitaFederal', url: '/consulta/cnpj', progress: 50, delay: 600, data: 'CNPJ, CNAE, socios' },
                { source: 'Serasa (AJAX)', url: '/api/credito', progress: 60, delay: 500, data: 'Score, restricoes, dividas' },
                { source: 'DETRAN (AJAX)', url: '/consulta/veiculos', progress: 70, delay: 450, data: 'Multas, CNH, veiculos' },
                { source: 'Instagram Graph API', url: '/v12.0/instagram', progress: 80, delay: 700, data: 'Analise profunda Instagram' },
                { source: 'Meta Marketing API', url: '/v18.0/me/adaccounts', progress: 90, delay: 600, data: 'Meta Ads Library' },
                { source: 'Data Consolidation', url: '/consolidate', progress: 100, delay: 500, data: 'Finalizando analise...' }
            ];
            
            for (const step of steps) {
                MiningController.updateProgress(step.progress, `AJAX ${step.source}: ${step.data}`);
                MiningController.log(step.source, `GET ${step.url} - ${step.data}`, !!step.alert);
                if (step.alert) MiningController.log(step.source, step.alert, true);
                
                OSINT.state.dataSources.push({
                    source: step.source,
                    url: step.url,
                    data: step.data,
                    status: 'success'
                });
                
                await new Promise(r => setTimeout(r, step.delay));
            }
            
            const results = generateBuscaPrimeData(query, type);
            displayResults(results);
        }
        
        function generateBuscaPrimeData(query, type) {
            return {
                query, type, timestamp: new Date().toISOString(),
                
                // BuscaPrime Style - Complete Contact Data
                contact: {
                    telefones: generatePhones(),
                    emails: generateEmails(query),
                    enderecos: generateAddresses(),
                    fonte: 'BuscaPrime Mirror API'
                },

        function generatePhones() {

                const ddd = ddds[Math.floor(Math.random() * ddds.length)];
                const num = Math.floor(Math.random() * 900000000 + 100000000).toString();
                return `(${ddd}) ${num.substr(0,5)}-${num.substr(5,4)}`;
            });
        }
        
        function generateEmails(query) {
            const domains = ['gmail.com', 'hotmail.com', 'outlook.com', 'yahoo.com.br', 'empresa.com.br'];
            const base = query.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s/g, '.');
            return [
                `${base}@${domains[0]}`,
                `${base}.${Math.floor(Math.random()*99)}@${domains[1]}`,
                `contato@${base}.com.br`
            ].slice(0, Math.floor(Math.random() * 3) + 1);
        }

            return `

                    <div style="display: flex; justify-content: space-between; color: #8892b0; font-size: 0.85rem; margin-top: 10px;">

                            <div class="card-subtitle">${meta.fonte}</div>
                        </div>
                    </div>
                    
                    <div class="data-row"><span class="data-label">Anúncios Ativos</span><span class="data-value">${meta.anunciosAtivos}</span></div>
                    <div class="data-row"><span class="data-label">Total Gasto</span><span class="data-value" style="color: #1877f2;">${meta.totalGasto}</span></div>
                    <div class="data-row"><span class="data-label">Alcance Total</span><span class="data-value">${meta.alcanceTotal.toLocaleString('pt-BR')}</span></div>
                    <div class="data-row"><span class="data-label">Impressões</span><span class="data-value">${meta.impressoes.toLocaleString('pt-BR')}</span></div>
                    <div class="data-row"><span class="data-label">CTI</span><span class="data-value">${meta.cti}</span></div>
                    
                    <div style="margin-top: 15px;">
                        <div class="data-label" style="margin-bottom: 10px;"><i class="fas fa-ad"></i> Campanhas</div>
                        ${meta.campanhas.map((camp, i) => `
                            <div class="meta-ad-item">
                                <div style="font-weight: 600; color: #1877f2;">${camp.nome}</div>
                                <div style="display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.85rem;">
                                    <span style="color: ${camp.status === 'Ativa' ? '#00ff88' : '#ffb800'};">${camp.status}</span>
                                    <span style="color: #8892b0;">${camp.gasto}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function generateVeicularCard(v) {
            return `
                <div class="result-card">
                    <div class="card-header">
                        <div class="card-icon personal"><i class="fas fa-car"></i></div>
                        <div><div class="card-title">Dados Veiculares</div><div class="card-subtitle">${v.fonte}</div></div>
                        <span class="status-badge ${v.multasPendentes > 0 ? 'badge-warning' : 'badge-success'}">${v.multasPendentes > 0 ? v.multasPendentes + ' MULTAS' : 'REGULAR'}</span>
                    </div>
                    <div class="data-row"><span class="data-label">Placa Principal</span><span class="data-value">${v.placa}</span></div>
                    <div class="data-row"><span class="data-label">Veículos Registrados</span><span class="data-value">${v.veiculosRegistrados}</span></div>
                    <div class="data-row"><span class="data-label">Multas Pendentes</span><span class="data-value ${v.multasPendentes > 0 ? 'warning' : 'success'}">${v.multasPendentes}</span></div>
                    <div class="data-row"><span class="data-label">Pontos CNH</span><span class="data-value ${v.pontosCNH > 10 ? 'danger' : 'success'}">${v.pontosCNH}</span></div>
                    <div class="data-row"><span class="data-label">Restrições</span><span class="data-value ${v.restricoes ? 'danger' : 'success'}">${v.restricoes ? 'SIM' : 'NÃO'}</span></div>
                </div>
            `;
        }
        
        function generateAnomaliesCard(anomalies) {
            if (!anomalies || anomalies.length === 0) {
                return `
                    <div class="result-card">
                        <div class="card-header">
                            <div class="card-icon personal"><i class="fas fa-check-circle"></i></div>
                            <div class="card-title">Anomalias & Alertas</div>
                        </div>
                        <div style="color: #00ff88; text-align: center; padding: 20px;">
                            <i class="fas fa-shield-alt" style="font-size: 3rem; margin-bottom: 10px;"></i>
                            <p>Nenhuma anomalia significativa detectada</p>
                        </div>
                    </div>
                `;
            }
            
            return `
                <div class="result-card" style="grid-column: 1 / -1;">
                    <div class="card-header">
                        <div class="card-icon anomaly"><i class="fas fa-exclamation-triangle"></i></div>
                        <div>
                            <div class="card-title">Anomalias & Alertas</div>
                            <div class="card-subtitle">Informações que requerem atenção</div>
                        </div>
                        <span class="status-badge badge-danger">${anomalies.length} ALERTAS</span>
                    </div>
                    <div class="anomaly-list">
                        ${anomalies.map(a => `
                            <div class="anomaly-item ${a.severity}">
                                <i class="fas fa-${a.severity === 'critical' ? 'times-circle' : a.severity === 'high' ? 'exclamation-circle' : 'info-circle'} anomaly-icon"></i>
                                <div>
                                    <div style="display: flex; align-items: center; gap: 8px;">
                                        <span style="background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 10px; font-size: 0.7rem;">${a.category}</span>
                                        <span class="anomaly-text" style="font-weight: 600;">${a.title}</span>
                                    </div>
                                    <div class="anomaly-text">${a.description}</div>
                                    <div class="anomaly-source">Fonte: ${a.source} | ${a.date}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        console.log('%c OSINT Brazuca Pro v5.0 ', 'background: #00d4ff; color: #000; font-size: 20px; font-weight: bold;');
        console.log('%c BuscaPrime Enhanced - AJAX Data Mining ', 'color: #00ff88;');
    </script>
</body>
</html>
