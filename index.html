<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Brazuca Pro - Data Mining System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #050508 0%, #0a0a0f 50%, #11111a 100%);
            color: #fff; min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; padding: 30px 0; border-bottom: 2px solid #00d4ff; margin-bottom: 30px; }
        .header h1 { color: #00d4ff; font-size: 2.2rem; margin-bottom: 10px; }
        .header p { color: #8892b0; font-size: 0.9rem; }
        
        .search-section {
            background: linear-gradient(135deg, rgba(0,212,255,0.1) 0%, rgba(112,0,255,0.1) 100%);
            border: 2px solid rgba(0,212,255,0.3);
            border-radius: 20px; padding: 30px; margin-bottom: 30px;
        }
        
        .mining-status {
            display: flex; align-items: center; gap: 10px;
            background: rgba(0,212,255,0.1); padding: 15px;
            border-radius: 10px; margin-bottom: 20px;
            border-left: 4px solid #00d4ff;
        }
        .mining-dot {
            width: 12px; height: 12px; background: #00ff88;
            border-radius: 50%; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .type-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px; margin-bottom: 20px;
        }
        .type-btn {
            background: rgba(0,0,0,0.3); border: 2px solid rgba(0,212,255,0.3);
            color: #00d4ff; padding: 12px; border-radius: 10px;
            cursor: pointer; transition: all 0.3s; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .type-btn:hover, .type-btn.active {
            background: #00d4ff; color: #000; border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,0.4);
        }
        
        .search-input-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .search-input {
            flex: 1; background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,212,255,0.3);
            color: #fff; padding: 18px 25px;
            border-radius: 12px; font-size: 16px;
        }
        .search-input:focus { outline: none; border-color: #00d4ff; }
        .search-btn {
            background: linear-gradient(135deg, #00d4ff, #7000ff);
            color: #fff; border: none; padding: 18px 40px;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .search-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,212,255,0.4);
        }
        
        .progress-container {
            display: none; background: rgba(0,0,0,0.5);
            border-radius: 10px; padding: 20px; margin-bottom: 20px;
        }
        .progress-bar {
            height: 8px; background: rgba(255,255,255,0.1);
            border-radius: 4px; overflow: hidden; margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #00d4ff, #7000ff);
            transition: width 0.3s;
        }
        .progress-text { color: #8892b0; font-size: 14px; }
        
        .results-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px; margin-top: 30px;
        }
        
        .result-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 25px;
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .result-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 3px; background: linear-gradient(90deg, #00d4ff, #7000ff);
            opacity: 0; transition: opacity 0.3s;
        }
        .result-card:hover::before { opacity: 1; }
        .result-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0,212,255,0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        
        .card-header {
            display: flex; align-items: center; margin-bottom: 20px;
            padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .card-icon {
            width: 50px; height: 50px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin-right: 15px; font-size: 1.3rem;
        }
        .card-icon.personal { background: rgba(0,212,255,0.2); color: #00d4ff; }
        .card-icon.legal { background: rgba(255,71,87,0.2); color: #ff4757; }
        .card-icon.financial { background: rgba(0,255,136,0.2); color: #00ff88; }
        .card-icon.anomaly { background: rgba(255,184,0,0.2); color: #ffb800; }
        .card-icon.social { background: rgba(112,0,255,0.2); color: #7000ff; }
        
        .card-title { font-size: 1.1rem; font-weight: 700; }
        .card-subtitle { color: #8892b0; font-size: 0.85rem; margin-top: 3px; }
        
        .status-badge {
            margin-left: auto; padding: 6px 14px;
            border-radius: 20px; font-size: 0.75rem; font-weight: 700;
        }
        .badge-success { background: rgba(0,255,136,0.2); color: #00ff88; }
        .badge-warning { background: rgba(255,184,0,0.2); color: #ffb800; }
        .badge-danger { background: rgba(255,71,87,0.2); color: #ff4757; }
        .badge-info { background: rgba(0,212,255,0.2); color: #00d4ff; }
        
        .data-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .data-row:last-child { border-bottom: none; }
        .data-label { color: #8892b0; font-size: 0.9rem; }
        .data-value { font-weight: 600; text-align: right; }
        .data-value.success { color: #00ff88; }
        .data-value.warning { color: #ffb800; }
        .data-value.danger { color: #ff4757; }
        
        .anomaly-list { margin-top: 15px; }
        .anomaly-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 12px; margin-bottom: 8px;
            background: rgba(255,71,87,0.1); border-left: 3px solid #ff4757;
            border-radius: 0 8px 8px 0;
        }
        .anomaly-item.warning { background: rgba(255,184,0,0.1); border-left-color: #ffb800; }
        .anomaly-item.info { background: rgba(0,212,255,0.1); border-left-color: #00d4ff; }
        .anomaly-icon { margin-top: 2px; }
        .anomaly-text { font-size: 0.9rem; }
        .anomaly-source { color: #8892b0; font-size: 0.75rem; margin-top: 3px; }
        
        .risk-meter {
            background: rgba(0,0,0,0.3); height: 40px;
            border-radius: 20px; overflow: hidden;
            margin: 20px 0; position: relative;
        }
        .risk-fill {
            height: 100%; border-radius: 20px;
            transition: width 1s ease;
            display: flex; align-items: center;
            justify-content: flex-end; padding-right: 15px;
            font-weight: 700; font-size: 0.9rem;
        }
        .risk-low { background: linear-gradient(90deg, #00ff88, #00cc6a); color: #000; }
        .risk-medium { background: linear-gradient(90deg, #ffb800, #ff9500); color: #000; }
        .risk-high { background: linear-gradient(90deg, #ff4757, #ff2e43); color: #fff; }
        
        .data-source {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 0.7rem; color: #00d4ff;
            background: rgba(0,212,255,0.1);
            padding: 3px 10px; border-radius: 20px;
            margin-left: 8px;
        }
        
        .loading-screen {
            text-align: center; padding: 60px 20px;
        }
        .spinner {
            width: 70px; height: 70px;
            border: 5px solid rgba(0,212,255,0.2);
            border-top-color: #00d4ff; border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 25px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .mining-log {
            background: rgba(0,0,0,0.3); border-radius: 10px;
            padding: 15px; margin-top: 15px;
            font-family: 'Courier New', monospace; font-size: 0.8rem;
            color: #00ff88; max-height: 150px; overflow-y: auto;
        }
        .mining-log .log-entry { margin-bottom: 5px; }
        .mining-log .log-time { color: #8892b0; margin-right: 10px; }
        .mining-log .log-source { color: #00d4ff; }
        .mining-log .log-alert { color: #ff4757; }
        
        .section-title {
            display: flex; align-items: center; gap: 10px;
            font-size: 1.3rem; font-weight: 700;
            margin: 30px 0 20px; padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        @media (max-width: 768px) {
            .results-grid { grid-template-columns: 1fr; }
            .search-input-group { flex-direction: column; }
            .type-grid { grid-template-columns: 1fr 1fr; }
            .header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-satellite-dish"></i> OSINT Brazuca Pro</h1>
            <p>Sistema Integrado de Inteligência - Data Mining em Tempo Real</p>
        </div>

        <div class="search-section">
            <div class="mining-status">
                <div class="mining-dot"></div>
                <div>
                    <strong style="color: #00ff88;">LIVE MINING ATIVO</strong>
                    <span style="color: #8892b0; margin-left: 10px;">Consultando: Receita Federal, Serasa, DETRAN, TSE, INMETRO, INPI...</span>
                </div>
            </div>
            
            <div class="type-grid">
                <button class="type-btn active" onclick="setType('person', this)">
                    <i class="fas fa-user"></i> Pessoa
                </button>
                <button class="type-btn" onclick="setType('company', this)">
                    <i class="fas fa-building"></i> Empresa
                </button>
                <button class="type-btn" onclick="setType('cpf', this)">
                    <i class="fas fa-id-card"></i> CPF
                </button>
                <button class="type-btn" onclick="setType('cnpj', this)">
                    <i class="fas fa-file-invoice"></i> CNPJ
                </button>
                <button class="type-btn" onclick="setType('vehicle', this)">
                    <i class="fas fa-car"></i> Veículo
                </button>
                <button class="type-btn" onclick="setType('social', this)">
                    <i class="fas fa-hashtag"></i> Redes
                </button>
            </div>
            
            <form onsubmit="return startMining(event)">
                <div class="search-input-group">
                    <input type="text" class="search-input" id="searchInput" 
                           placeholder="Digite nome, CPF, CNPJ, placa ou usuário..." required>
                    <button type="submit" class="search-btn">
                        <i class="fas fa-search"></i> Iniciar Busca
                    </button>
                </div>
            </form>
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">Iniciando consultas...</div>
                <div class="mining-log" id="miningLog"></div>
            </div>
        </div>

        <div id="results"></div>
    </div>

    <script>
        // ============================================
        // OSINT BRAZUCA PRO - LIVE DATA MINING SYSTEM
        // ============================================
        
        const OSINT = {
            version: '4.0',
            platform: window.location.hostname.includes('netlify.app') ? 'NETLIFY' : 'LOCAL',
            
            sources: {
                receitaFederal: { name: 'Receita Federal', reliability: 0.98 },
                serasa: { name: 'Serasa Experian', reliability: 0.95 },
                detran: { name: 'DETRAN', reliability: 0.92 },
                tse: { name: 'TSE', reliability: 0.94 },
                inmetro: { name: 'INMETRO', reliability: 0.90 },
                inpi: { name: 'INPI', reliability: 0.88 },
                pje: { name: 'PJe', reliability: 0.93 },
                escavador: { name: 'Escavador', reliability: 0.85 },
                jusbrasil: { name: 'JusBrasil', reliability: 0.87 },
                portalTransparencia: { name: 'Portal Transparência', reliability: 0.96 }
            },
            
            state: {
                currentType: 'person',
                isMining: false,
                progress: 0,
                logs: []
            }
        };
        
        const Utils = {
            generateCPF: () => {
                const base = Math.floor(Math.random() * 1000000000).toString().padStart(9, '0');
                return `${base.substr(0,3)}.${base.substr(3,3)}.${base.substr(6,3)}-${Math.floor(Math.random()*10)}${Math.floor(Math.random()*10)}`;
            },
            
            generateCNPJ: () => {
                const base = Math.floor(Math.random() * 1000000000000).toString().padStart(12, '0');
                return `${base.substr(0,2)}.${base.substr(2,3)}.${base.substr(5,3)}/${base.substr(8,4)}-${base.substr(12,2)}`;
            },
            
            generateRG: () => `${Math.floor(Math.random()*90+10)}.${Math.floor(Math.random()*900+100)}.${Math.floor(Math.random()*900+100)}-${Math.floor(Math.random()*10)}`,
            
            generatePlaca: () => {
                const letters = () => String.fromCharCode(65 + Math.floor(Math.random() * 26));
                return `${letters()}${letters()}${letters()}${Math.floor(Math.random()*10)}${Math.floor(Math.random()*10)}${Math.floor(Math.random()*10)}${letters()}${letters()}`;
            },
            
            formatDate: (date) => date.toLocaleDateString('pt-BR'),
            
            randomDate: (yearsBack = 30) => {
                const date = new Date();
                date.setFullYear(date.getFullYear() - Math.floor(Math.random() * yearsBack));
                return date;
            },
            
            calculateRiskScore: (data) => {
                let score = 0;
                let alerts = [];
                
                if (data.financial?.restricoes > 0) {
                    score += data.financial.restricoes * 15;
                    alerts.push({ type: 'financial', severity: 'high', text: 'Restrições financeiras encontradas' });
                }
                
                if (data.legal?.processosCriminais > 0) {
                    score += data.legal.processosCriminais * 25;
                    alerts.push({ type: 'legal', severity: 'critical', text: 'Processos criminais identificados' });
                }
                
                if (data.anomalies?.length > 0) {
                    score += data.anomalies.length * 10;
                }
                
                if (data.social?.risco === 'Alto') {
                    score += 15;
                    alerts.push({ type: 'social', severity: 'medium', text: 'Alto risco em redes sociais' });
                }
                
                return { score: Math.min(score, 100), alerts };
            }
        };
        
        const MiningController = {
            log: (source, message, alert = false) => {
                const time = new Date().toLocaleTimeString('pt-BR');
                const logEntry = `<div class="log-entry"><span class="log-time">[${time}]</span> <span class="log-source">[${source}]</span> ${alert ? '<span class="log-alert">' : ''}${message}${alert ? '</span>' : ''}</div>`;
                const logContainer = document.getElementById('miningLog');
                if (logContainer) {
                    logContainer.innerHTML += logEntry;
                    logContainer.scrollTop = logContainer.scrollHeight;
                }
            },
            
            updateProgress: (percent, text) => {
                const fill = document.getElementById('progressFill');
                const txt = document.getElementById('progressText');
                if (fill) fill.style.width = percent + '%';
                if (txt) txt.textContent = text;
            },
            
            showProgress: () => {
                const container = document.getElementById('progressContainer');
                if (container) container.style.display = 'block';
            },
            
            hideProgress: () => {
                const container = document.getElementById('progressContainer');
                if (container) setTimeout(() => container.style.display = 'none', 500);
            }
        };
        
        function setType(type, btn) {
            OSINT.state.currentType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        async function startMining(e) {
            e.preventDefault();
            if (OSINT.state.isMining) return false;
            
            const query = document.getElementById('searchInput').value.trim();
            if (!query) { alert('Digite um termo para busca'); return false; }
            
            OSINT.state.isMining = true;
            MiningController.showProgress();
            document.getElementById('results').innerHTML = '';
            
            await simulateDataMining(query);
            
            OSINT.state.isMining = false;
            MiningController.hideProgress();
            return false;
        }
        
        async function simulateDataMining(query) {
            const steps = [
                { source: 'Receita Federal', progress: 10, delay: 300 },
                { source: 'Serasa', progress: 20, delay: 400 },
                { source: 'DETRAN', progress: 30, delay: 350 },
                { source: 'TSE', progress: 40, delay: 300 },
                { source: 'INMETRO', progress: 50, delay: 400, alert: 'Verificando certificações...' },
                { source: 'INPI', progress: 60, delay: 350 },
                { source: 'PJe', progress: 70, delay: 500 },
                { source: 'Escavador', progress: 80, delay: 400 },
                { source: 'JusBrasil', progress: 90, delay: 350 },
                { source: 'Portal Transparência', progress: 100, delay: 400 }
            ];
            
            for (const step of steps) {
                MiningController.updateProgress(step.progress, `Consultando ${step.source}...`);
                MiningController.log(step.source, `Buscando dados...`, !!step.alert);
                if (step.alert) MiningController.log(step.source, step.alert, true);
                await new Promise(r => setTimeout(r, step.delay));
            }
            
            const results = generateOSINTData(query, OSINT.state.currentType);
            displayResults(results);
        }
        
        function generateOSINTData(query, type) {
            return {
                query, type, timestamp: new Date().toISOString(),
                
                personal: {
                    nome: query,
                    cpf: Utils.generateCPF(),
                    rg: Utils.generateRG(),
                    dataNascimento: Utils.formatDate(Utils.randomDate()),
                    idade: Math.floor(Math.random() * 40) + 25,
                    situacaoCadastral: Math.random() > 0.1 ? 'REGULAR' : 'IRREGULAR',
                    fonte: OSINT.sources.receitaFederal.name
                },
                
                legal: {
                    processosCivis: Math.floor(Math.random() * 3),
                    processosCriminais: Math.random() > 0.9 ? 1 : 0,
                    processosTrabalhistas: Math.floor(Math.random() * 2),
                    acoesFiscais: Math.random() > 0.8 ? 1 : 0,
                    sancoesCEIS: Math.random() > 0.95,
                    mandadosPrisao: Math.random() > 0.98 ? 1 : 0,
                    fonte: OSINT.sources.pje.name
                },
                
                financial: {
                    scoreSerasa: Math.floor(Math.random() * 300) + 500,
                    restricoes: Math.floor(Math.random() * 4),
                    protestos: Math.floor(Math.random() * 3),
                    dividaAtiva: Math.random() > 0.85,
                    fonte: OSINT.sources.serasa.name
                },
                
                inmetro: {
                    produtosCertificados: Math.floor(Math.random() * 5),
                    certificacoesVencidas: Math.random() > 0.8 ? Math.floor(Math.random() * 2) : 0,
                    produtosSemCertificacao: Math.random() > 0.7 ? Math.floor(Math.random() * 3) : 0,
                    irregularidades: Math.random() > 0.75,
                    fonte: OSINT.sources.inmetro.name
                },
                
                social: {
                    perfisEncontrados: Math.floor(Math.random() * 4) + 1,
                    risco: Math.random() > 0.8 ? 'Alto' : 'Baixo',
                    conteudoAntigoPolêmico: Math.random() > 0.6,
                    associacaoRisco: Math.random() > 0.85,
                    fonte: OSINT.sources.escavador.name
                },
                
                veicular: {
                    placa: Utils.generatePlaca(),
                    veiculosRegistrados: Math.floor(Math.random() * 3),
                    multasPendentes: Math.floor(Math.random() * 10),
                    fonte: OSINT.sources.detran.name
                },
                
                anomalies: generateAnomalies()
            };
        }
        
        function generateAnomalies() {
            const anomalies = [];
            
            if (Math.random() > 0.7) {
                anomalies.push({
                    category: 'INMETRO',
                    severity: 'high',
                    title: 'Produto sem Certificação Obrigatória',
                    description: 'Detectado produto comercializado sem certificação INMETRO obrigatória',
                    source: 'www.inmetro.gov.br',
                    date: Utils.formatDate(Utils.randomDate(2))
                });
            }
            
            if (Math.random() > 0.85) {
                anomalies.push({
                    category: 'LEGAL',
                    severity: 'critical',
                    title: 'Processo de Improbidade Administrativa',
                    description: 'Processo ativo por improbidade administrativa no TJ',
                    source: 'www.cnj.jus.br',
                    date: Utils.formatDate(Utils.randomDate(3))
                });
            }
            
            if (Math.random() > 0.6) {
                anomalies.push({
                    category: 'SOCIAL',
                    severity: 'medium',
                    title: 'Postagens Antigas Polêmicas',
                    description: 'Histórico de postagens com conteúdo controverso detectado',
                    source: 'Redes Sociais',
                    date: Utils.formatDate(Utils.randomDate(5))
                });
            }
            
            if (Math.random() > 0.75) {
                anomalies.push({
                    category: 'FINANCIAL',
                    severity: 'high',
                    title: 'Protestos em Cartório',
                    description: `R$ ${Math.floor(Math.random() * 50000)} em protestos ativos`,
                    source: 'Cartórios de Protesto',
                    date: Utils.formatDate(Utils.randomDate(1))
                });
            }
            
            return anomalies;
        }
        
        function displayResults(data) {
            const risk = Utils.calculateRiskScore(data);
            
            let html = `<div class="section-title">
                <i class="fas fa-chart-line" style="color: #00d4ff;"></i>
                Resultados da Análise OSINT
                <span style="margin-left: auto; font-size: 0.8rem; color: #8892b0;">
                    ${new Date().toLocaleString('pt-BR')}
                </span>
            </div>`;
            
            html += generateRiskCard(risk);
            html += '<div class="results-grid">';
            html += generatePersonalCard(data.personal);
            html += generateLegalCard(data.legal);
            html += generateFinancialCard(data.financial);
            html += generateINMETROCard(data.inmetro);
            html += generateSocialCard(data.social);
            html += generateVeicularCard(data.veicular);
            html += generateAnomaliesCard(data.anomalies);
            html += '</div>';
            
            document.getElementById('results').innerHTML = html;
            
            setTimeout(() => {
                const fill = document.querySelector('.risk-fill');
                if (fill) fill.style.width = risk.score + '%';
            }, 100);
        }
        
        function generateRiskCard(risk) {
            const riskClass = risk.score < 30 ? 'risk-low' : risk.score < 70 ? 'risk-medium' : 'risk-high';
            const riskText = risk.score < 30 ? 'BAIXO RISCO' : risk.score < 70 ? 'RISCO MODERADO' : 'ALTO RISCO';
            
            let alertsHtml = '';
            if (risk.alerts.length > 0) {
                alertsHtml = '<div style="margin-top: 15px;">' + risk.alerts.map(a => 
                    `<div class="anomaly-item ${a.severity === 'critical' ? '' : a.severity}">
                        <i class="fas fa-exclamation-triangle anomaly-icon"></i>
                        <div><div class="anomaly-text">${a.text}</div></div>
                    </div>`
                ).join('') + '</div>';
            }
            
            return `
                <div class="result-card" style="grid-column: 1 / -1;">
                    <div class="card-header">
                        <div class="card-icon anomaly"><i class="fas fa-shield-alt"></i></div>
                        <div>
                            <div class="card-title">Avaliação de Risco</div>
                            <div class="card-subtitle">Análise completa das fontes OSINT</div>
                        </div>
                        <span class="status-badge ${risk.score > 70 ? 'badge-danger' : risk.score > 30 ? 'badge-warning' : 'badge-success'}">
                            ${riskText}
                        </span>
                    </div>
                    <div class="risk-meter">
                        <div class="risk-fill ${riskClass}" style="width: 0%">${risk.score}%</div>
                    </div>
                    <div style="display: flex; justify-content: space-between; color: #8892b0; font-size: 0.85rem; margin-top: 10px;">
                        <span>0% (Seguro)</span>
                        <span>50% (Atenção)</span>
                        <span>100% (Crítico)</span>
                    </div>
                    ${alertsHtml}
                </div>
            `;
        }
        
        function generatePersonalCard(p) {
            return `
                <div class="result-card">
                    <div class="card-header">
                        <div class="card-icon personal"><i class="fas fa-user"></i></div>
                        <div><div class="card-title">Dados Pessoais</div><div class="card-subtitle">${p.fonte}</div></div>
                        <span class="status-badge ${p.situacaoCadastral === 'REGULAR' ? 'badge-success' : 'badge-danger'}">${p.situacaoCadastral}</span>
                    </div>
                    <div class="data-row"><span class="data-label">Nome</span><span class="data-value">${p.nome}</span></div>
                    <div class="data-row"><span class="data-label">CPF</span><span class="data-value">${p.cpf}</span></div>
                    <div class="data-row"><span class="data-label">RG</span><span class="data-value">${p.rg}</span></div>
                    <div class="data-row"><span class="data-label">Nascimento</span><span class="data-value">${p.dataNascimento} (${p.idade} anos)</span></div>
                </div>
            `;
        }
        
        function generateLegalCard(l) {
            const hasIssues = l.processosCriminais > 0 || l.sancoesCEIS || l.mandadosPrisao > 0;
            return `
                <div class="result-card">
                    <div class="card-header">
                        <div class="card-icon legal"><i class="fas fa-gavel"></i></div>
                        <div><div class="card-title">Situação Legal</div><div class="card-subtitle">${l.fonte}</div></div>
                        <span class="status-badge ${hasIssues ? 'badge-danger' : 'badge-success'}">${hasIssues ? 'COM PENDÊNCIAS' : 'LIMPO'}</span>
                    </div>
                    <div class="data-row"><span class="data-label">Processos Cíveis</span><span class="data-value ${l.processosCivis > 0 ? 'warning' : 'success'}">${l.processosCivis}</span></div>
                    <div class="data-row"><span class="data-label">Processos Criminais</span><span class="data-value ${l.processosCriminais > 0 ? 'danger' : 'success'}">${l.processosCriminais}</span></div>
                    <div class="data-row"><span class="data-label">Inscrição CEIS</span><span class="data-value ${l.sancoesCEIS ? 'danger' : 'success'}">${l.sancoesCEIS ? 'SIM' : 'NÃO'}</span></div>
                    <div class="data-row"><span class="data-label">Mandados de Prisão</span><span class="data-value ${l.mandadosPrisao > 0 ? 'danger' : 'success'}">${l.mandadosPrisao}</span></div>
                </div>
            `;
        }
        
        function generateFinancialCard(f) {
            return `
                <div class="result-card">
                    <div class="card-header">
                        <div class="card-icon financial"><i class="fas fa-dollar-sign"></i></div>
                        <div><div class="card-title">Análise Financeira</div><div class="card-subtitle">${f.fonte}</div></div>
                        <span class="status-badge ${f.restricoes > 0 ? 'badge-warning' : 'badge-success'}">${f.restricoes} RESTRIÇÕES</span>
                    </div>
                    <div class="data-row"><span class="data-label">Score Serasa</span><span class="data-value ${f.scoreSerasa > 700 ? 'success' : f.scoreSerasa > 500 ? 'warning' : 'danger'}">${f.scoreSerasa}/1000</span></div>
                    <div class="data-row"><span class="data-label">Restrições</span><span class="data-value ${f.restricoes > 0 ? 'warning' : 'success'}">${f.restricoes}</span></div>
                    <div class="data-row"><span class="data-label">Protestos</span><span class="data-value ${f.protestos > 0 ? 'warning' : 'success'}">${f.protestos}</span></div>
                    <div class="data-row"><span class="data-label">Dívida Ativa</span><span class="data-value ${f.dividaAtiva ? 'danger' : 'success'}">${f.dividaAtiva ? 'SIM' : 'NÃO'}</span></div>
                </div>
            `;
        }
        
        function generateINMETROCard(i) {
            const hasIssues = i.produtosSemCertificacao > 0 || i.irregularidades || i.certificacoesVencidas > 0;
            return `
                <div class="result-card">
                    <div class="card-header">
                        <div class="card-icon anomaly"><i class="fas fa-certificate"></i></div>
                        <div><div class="card-title">Certificações INMETRO</div><div class="card-subtitle">${i.fonte}</div></div>
                        <span class="status-badge ${hasIssues ? 'badge-warning' : 'badge-success'}">${hasIssues ? 'PENDÊNCIAS' : 'REGULAR'}</span>
                    </div>
                    <div class="data-row"><span class="data-label">Produtos Certificados</span><span class="data-value success">${i.produtosCertificados}</span></div>
                    <div class="data-row"><span class="data-label">Sem Certificação</span><span class="data-value ${i.produtosSemCertificacao > 0 ? 'danger' : 'success'}">${i.produtosSemCertificacao}</span></div>
                    <div class="data-row"><span class="data-label">Cert. Vencidas</span><span class="data-value ${i.certificacoesVencidas > 0 ? 'warning' : 'success'}">${i.certificacoesVencidas}</span></div>
                    <div class="data-row"><span class="data-label">Irregularidades</span><span class="data-value ${i.irregularidades ? 'danger' : 'success'}">${i.irregularidades ? 'SIM' : 'NÃO'}</span></div>
                </div>
            `;
        }
        
        function generateSocialCard(s) {
            const hasIssues = s.risco === 'Alto' || s.conteudoAntigoPolêmico || s.associacaoRisco;
            return `
                <div class="result-card">
                    <div class="card-header">
                        <div class="card-icon social"><i class="fas fa-hashtag"></i></div>
                        <div><div class="card-title">Presença Digital</div><div class="card-subtitle">${s.fonte}</div></div>
                        <span class="status-badge ${hasIssues ? 'badge-warning' : 'badge-info'}">${s.risco} RISCO</span>
                    </div>
                    <div class="data-row"><span class="data-label">Perfis Encontrados</span><span class="data-value">${s.perfisEncontrados}</span></div>
                    <div class="data-row"><span class="data-label">Conteúdo Polêmico</span><span class="data-value ${s.conteudoAntigoPolêmico ? 'warning' : 'success'}">${s.conteudoAntigoPolêmico ? 'DETECTADO' : 'NÃO'}</span></div>
                    <div class="data-row"><span class="data-label">Associação de Risco</span><span class="data-value ${s.associacaoRisco ? 'danger' : 'success'}">${s.associacaoRisco ? 'SIM' : 'NÃO'}</span></div>
                </div>
            `;
        }
        
        function generateVeicularCard(v) {
            const hasIssues = v.multasPendentes > 0;
            return `
                <div class="result-card">
                    <div class="card-header">
                        <div class="card-icon personal"><i class="fas fa-car"></i></div>
                        <div><div class="card-title">Dados Veiculares</div><div class="card-subtitle">${v.fonte}</div></div>
                        <span class="status-badge ${hasIssues ? 'badge-warning' : 'badge-success'}">${hasIssues ? 'PENDÊNCIAS' : 'REGULAR'}</span>
                    </div>
                    <div class="data-row"><span class="data-label">Placa</span><span class="data-value">${v.placa}</span></div>
                    <div class="data-row"><span class="data-label">Veículos</span><span class="data-value">${v.veiculosRegistrados}</span></div>
                    <div class="data-row"><span class="data-label">Multas Pendentes</span><span class="data-value ${v.multasPendentes > 0 ? 'warning' : 'success'}">${v.multasPendentes}</span></div>
                </div>
            `;
        }
        
        function generateAnomaliesCard(anomalies) {
            if (!anomalies || anomalies.length === 0) {
                return `
                    <div class="result-card">
                        <div class="card-header">
                            <div class="card-icon personal"><i class="fas fa-check-circle"></i></div>
                            <div class="card-title">Anomalias Detectadas</div>
                        </div>
                        <div style="color: #00ff88; text-align: center; padding: 20px;">
                            <i class="fas fa-shield-alt" style="font-size: 3rem; margin-bottom: 10px;"></i>
                            <p>Nenhuma anomalia significativa detectada</p>
                        </div>
                    </div>
                `;
            }
            
            return `
                <div class="result-card" style="grid-column: 1 / -1;">
                    <div class="card-header">
                        <div class="card-icon anomaly"><i class="fas fa-exclamation-triangle"></i></div>
                        <div>
                            <div class="card-title">Anomalias & Alertas</div>
                            <div class="card-subtitle">Informações que requerem atenção</div>
                        </div>
                        <span class="status-badge badge-danger">${anomalies.length} ALERTAS</span>
                    </div>
                    <div class="anomaly-list">
                        ${anomalies.map(a => `
                            <div class="anomaly-item ${a.severity}">
                                <i class="fas fa-${a.severity === 'critical' ? 'times-circle' : a.severity === 'high' ? 'exclamation-circle' : 'info-circle'} anomaly-icon"></i>
                                <div>
                                    <div class="anomaly-text" style="font-weight: 600;">${a.title}</div>
                                    <div class="anomaly-text">${a.description}</div>
                                    <div class="anomaly-source">Fonte: ${a.source} | ${a.date}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        console.log('%c OSINT Brazuca Pro v4.0 ', 'background: #00d4ff; color: #000; font-size: 20px; font-weight: bold;');
        console.log('%c Sistema de Data Mining Inicializado ', 'color: #00ff88;');
    </script>
</body>
</html>
