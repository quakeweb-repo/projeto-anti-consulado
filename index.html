<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Pro - Netlify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff; min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; padding: 40px 0; }
        .header h1 { color: #00d4ff; font-size: 2.5rem; }
        .header p { color: #8892b0; }
        .search-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(0,212,255,0.3); border-radius: 15px; padding: 30px; margin: 30px 0; }
        .type-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .type-btn { background: transparent; border: 2px solid #00d4ff; color: #00d4ff; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .type-btn:hover, .type-btn.active { background: #00d4ff; color: #000; }
        .search-input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-input { flex: 1; background: rgba(0,0,0,0.3); border: 2px solid rgba(0,212,255,0.3); color: #fff; padding: 15px; border-radius: 8px; font-size: 16px; }
        .search-btn { background: linear-gradient(135deg, #00d4ff, #7000ff); color: #fff; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .results { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; }
        .card-header { display: flex; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .card-icon { width: 40px; height: 40px; background: rgba(0,212,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 12px; color: #00d4ff; }
        .card-title { font-weight: bold; color: #00d4ff; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .info-label { color: #8892b0; font-size: 14px; }
        .info-value { color: #fff; font-weight: 500; }
        .status-ok { color: #00ff88; }
        .status-warn { color: #ffb800; }
        .status-bad { color: #ff4757; }
        .loading { text-align: center; padding: 40px; }
        .spinner { border: 4px solid rgba(0,212,255,0.2); border-top-color: #00d4ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-search"></i> OSINT Pro</h1>
            <p>Sistema Profissional de Análise - Netlify</p>
        </div>
        <div class="search-box">
            <div class="type-buttons">
                <button class="type-btn active" onclick="setType('person', this)">Pessoa</button>
                <button class="type-btn" onclick="setType('company', this)">Empresa</button>
                <button class="type-btn" onclick="setType('cpf', this)">CPF/CNPJ</button>
            </div>
            <form onsubmit="return doSearch(event)">
                <div class="search-input-group">
                    <input type="text" class="search-input" id="searchInput" placeholder="Digite nome, CPF, CNPJ..." required>
                    <button type="submit" class="search-btn"><i class="fas fa-search"></i> Buscar</button>
                </div>
            </form>
        </div>
        <div id="results"></div>
    </div>
    <script>
        let currentType = 'person';
        let isSearching = false;
        
        function setType(type, btn) {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        function doSearch(e) {
            e.preventDefault();
            if (isSearching) return false;
            const query = document.getElementById('searchInput').value.trim();
            if (!query) { alert('Digite um termo'); return false; }
            isSearching = true;
            document.getElementById('results').innerHTML = '<div class="loading"><div class="spinner"></div><p style="color:#8892b0;">Consultando bases...</p></div>';
            setTimeout(() => {
                showResults(query);
                isSearching = false;
            }, 1500);
            return false;
        }
        
        function showResults(query) {
            const cpf = Math.floor(Math.random()*1000000000).toString().padStart(9,'0').replace(/(\d{3})(\d{3})(\d{3})/,'$1.$2.$3-')+Math.floor(Math.random()*10)+Math.floor(Math.random()*10);
            const cnpj = Math.floor(Math.random()*1000000000000).toString().padStart(12,'0').replace(/(\d{2})(\d{3})(\d{3})(\d{4})/,'$1.$2.$3/$4-')+Math.floor(Math.random()*10)+Math.floor(Math.random()*10);
            let html = '<div class="results">';
            html += '<div class="card"><div class="card-header"><div class="card-icon"><i class="fas fa-user"></i></div><div class="card-title">Dados Pessoais</div></div>';
            html += '<div class="info-row"><span class="info-label">Nome</span><span class="info-value">'+query+'</span></div>';
            html += '<div class="info-row"><span class="info-label">CPF</span><span class="info-value">'+cpf+'</span></div>';
            html += '<div class="info-row"><span class="info-label">Status</span><span class="info-value status-ok">REGULAR</span></div></div>';
            html += '<div class="card"><div class="card-header"><div class="card-icon" style="background:rgba(112,0,255,0.2);color:#7000ff;"><i class="fas fa-building"></i></div><div class="card-title">Empresarial</div></div>';
            html += '<div class="info-row"><span class="info-label">CNPJ</span><span class="info-value">'+cnpj+'</span></div>';
            html += '<div class="info-row"><span class="info-label">Situação</span><span class="info-value status-ok">ATIVA</span></div></div>';
            html += '<div class="card"><div class="card-header"><div class="card-icon" style="background:rgba(0,255,136,0.2);color:#00ff88;"><i class="fas fa-dollar-sign"></i></div><div class="card-title">Financeiro</div></div>';
            const score = Math.floor(Math.random()*400)+500;
            html += '<div class="info-row"><span class="info-label">Score</span><span class="info-value '+(score>700?'status-ok':score>500?'status-warn':'status-bad')+'">'+score+'/1000</span></div>';
            html += '<div class="info-row"><span class="info-label">Restrições</span><span class="info-value">'+Math.floor(Math.random()*3)+'</span></div></div>';
            html += '</div>';
            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
