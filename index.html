<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Check Pro - OSINT Professional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff41;
            --secondary: #0a0a0a;
            --accent: #1a1a1a;
            --danger: #ff4444;
            --warning: #ffaa00;
            --success: #00cc66;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid var(--primary);
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            color: var(--primary);
            font-size: 28px;
            font-weight: bold;
            margin: 0;
        }
        
        .header p {
            color: #888;
            margin: 5px 0 0 0;
            font-size: 14px;
        }
        
        .search-container {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--primary);
            border-radius: 10px;
            padding: 30px;
            margin: 20px auto;
            max-width: 1200px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
        }
        
        .type-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .type-btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .type-btn:hover, .type-btn.active {
            background: var(--primary);
            color: #000;
        }
        
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .search-input {
            flex: 1;
            background: #1a1a1a;
            border: 2px solid #333;
            color: var(--primary);
            padding: 15px 20px;
            font-size: 16px;
            border-radius: 5px;
            outline: none;
        }
        
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }
        
        .search-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        
        .search-btn:hover {
            background: #00cc33;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.5);
        }
        
        .depth-select {
            background: #1a1a1a;
            border: 2px solid #333;
            color: #fff;
            padding: 12px 20px;
            font-size: 14px;
            border-radius: 5px;
            width: 100%;
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin: 30px auto;
            max-width: 1400px;
            padding: 0 20px;
        }
        
        .result-card {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .result-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        
        .card-icon {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 24px;
            color: #000;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: auto;
        }
        
        .status-clear { background: var(--success); color: #000; }
        .status-warning { background: var(--warning); color: #000; }
        .status-high-risk { background: var(--danger); color: #fff; }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #222;
        }
        
        .info-label { color: #888; font-size: 13px; }
        .info-value { color: #fff; font-weight: 500; font-size: 13px; }
        
        .risk-section {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--warning);
            border-radius: 10px;
            padding: 20px;
            margin: 20px auto;
            max-width: 1200px;
        }
        
        .risk-meter {
            height: 30px;
            background: #222;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .risk-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--warning), var(--danger));
            transition: width 0.5s ease;
        }
        
        .alert-item {
            padding: 10px 15px;
            margin: 5px 0;
            border-radius: 5px;
            font-size: 13px;
        }
        
        .alert-high { background: rgba(255, 68, 68, 0.2); border-left: 3px solid var(--danger); color: #fff; }
        .alert-medium { background: rgba(255, 170, 0, 0.2); border-left: 3px solid var(--warning); color: #fff; }
        .alert-low { background: rgba(0, 204, 102, 0.2); border-left: 3px solid var(--success); color: #fff; }
        
        .loading-skeleton {
            height: 20px;
            background: linear-gradient(90deg, #222 25%, #333 50%, #222 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            margin: 10px 0;
            border-radius: 5px;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .timeline-section {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin: 20px auto;
            max-width: 1200px;
        }
        
        .timeline-item {
            display: flex;
            padding: 15px 0;
            border-left: 2px solid var(--primary);
            margin-left: 20px;
            padding-left: 20px;
            position: relative;
        }
        
        .timeline-dot {
            position: absolute;
            left: -7px;
            top: 20px;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
        }
        
        .timeline-date {
            color: var(--primary);
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .timeline-text {
            color: #fff;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-search"></i> Background Check Pro</h1>
        <p>Sistema OSINT Profissional de Verificação</p>
    </div>

    <div class="search-container">
        <div class="type-selector">
            <button type="button" class="type-btn active" onclick="setType('person')">
                <i class="fas fa-user"></i> Pessoa
            </button>
            <button type="button" class="type-btn" onclick="setType('company')">
                <i class="fas fa-building"></i> Empresa
            </button>
            <button type="button" class="type-btn" onclick="setType('cpf')">
                <i class="fas fa-id-card"></i> CPF
            </button>
            <button type="button" class="type-btn" onclick="setType('phone')">
                <i class="fas fa-phone"></i> Telefone
            </button>
            <button type="button" class="type-btn" onclick="setType('email')">
                <i class="fas fa-envelope"></i> E-mail
            </button>
        </div>
        
        <form onsubmit="return doSearch(event)">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" 
                       placeholder="Digite nome, CPF, CNPJ, telefone ou e-mail..." required>
                <button type="submit" class="search-btn">
                    <i class="fas fa-search"></i> VERIFICAR
                </button>
            </div>
            <select class="depth-select" id="depthSelect">
                <option value="basic">Básico - Informações públicas</option>
                <option value="standard" selected>Padrão - Dados completos</option>
                <option value="deep">Profundo - Análise avançada</option>
                <option value="comprehensive">Completo - Investigação total</option>
            </select>
        </form>
    </div>

    <div id="resultsGrid" class="results-grid"></div>
    
    <div id="riskSection" class="risk-section" style="display: none;">
        <h4 style="color: var(--primary); margin-bottom: 15px;">
            <i class="fas fa-shield-alt"></i> Avaliação de Risco
        </h4>
        <div class="risk-meter">
            <div class="risk-fill" id="riskFill" style="width: 0%"></div>
        </div>
        <p class="text-center" id="riskPercentage" style="font-size: 24px; font-weight: bold; color: var(--primary);">0%</p>
        <div id="alertList"></div>
    </div>
    
    <div id="timelineSection" class="timeline-section" style="display: none;">
        <h4 style="color: var(--primary); margin-bottom: 15px;">
            <i class="fas fa-history"></i> Timeline de Eventos
        </h4>
        <div id="timelineContent"></div>
    </div>

    <script>
        // ============================================
        // BACKGROUND CHECK PRO - STANDALONE VERSION
        // Netlify Ready - No External Dependencies
        // ============================================
        
        var currentType = 'person';
        var isSearching = false;
        
        console.log('========================================');
        console.log('Background Check Pro - Standalone v3.0');
        console.log('Platform:', window.location.hostname.includes('netlify.app') ? 'NETLIFY' : 'OTHER');
        console.log('========================================');
        
        function setType(type) {
            currentType = type;
            var btns = document.querySelectorAll('.type-btn');
            for (var i = 0; i < btns.length; i++) {
                btns[i].classList.remove('active');
            }
            event.target.classList.add('active');
            
            var input = document.getElementById('searchInput');
            var placeholders = {
                'person': 'Digite nome completo da pessoa...',
                'company': 'Digite razão social ou CNPJ...',
                'cpf': 'Digite CPF (apenas números)...',
                'phone': 'Digite telefone com DDD...',
                'email': 'Digite endereço de e-mail...'
            };
            input.placeholder = placeholders[type] || placeholders['person'];
        }
        
        function doSearch(e) {
            e.preventDefault();
            if (isSearching) return false;
            
            var query = document.getElementById('searchInput').value.trim();
            if (!query) {
                alert('Por favor, digite um termo para pesquisa');
                return false;
            }
            
            isSearching = true;
            showLoading();
            
            // Simulate OSINT search
            setTimeout(function() {
                var results = generateResults(query, currentType);
                displayResults(results);
                isSearching = false;
            }, 1500);
            
            return false;
        }
        
        function showLoading() {
            var grid = document.getElementById('resultsGrid');
            grid.innerHTML = '<div class="result-card"><div class="card-header"><div class="card-icon"><i class="fas fa-spinner fa-spin"></i></div><div class="card-title">Processando Busca OSINT...</div></div><div class="loading-skeleton"></div><div class="loading-skeleton"></div><div class="loading-skeleton"></div></div>';
            
            document.getElementById('riskSection').style.display = 'block';
            document.getElementById('riskFill').style.width = '0%';
            document.getElementById('riskPercentage').textContent = '0%';
            document.getElementById('alertList').innerHTML = '<div class="alert-item">Analisando fontes de dados...</div>';
        }
        
        function generateResults(query, type) {
            var timestamp = new Date().toLocaleDateString('pt-BR');
            var cpf = generateCPF();
            var cnpj = generateCNPJ();
            
            return {
                personal: {
                    nome: query,
                    cpf: cpf,
                    nascimento: '15/03/1985',
                    situacao: 'Regular',
                    fonte: 'Receita Federal'
                },
                business: {
                    razaoSocial: query + ' Ltda',
                    cnpj: cnpj,
                    situacao: 'Ativa',
                    porte: 'Médio',
                    fonte: 'Receita Federal'
                },
                financial: {
                    score: Math.floor(Math.random() * 300) + 600,
                    restricoes: Math.floor(Math.random() * 3),
                    dividas: Math.floor(Math.random() * 50000),
                    fonte: 'Serasa Experian'
                },
                social: {
                    linkedin: 'Perfil encontrado',
                    facebook: '2 perfis',
                    instagram: '1 perfil',
                    risco: 'Baixo'
                },
                legal: {
                    processos: Math.floor(Math.random() * 5),
                    certidoes: 3,
                    debitos: Math.floor(Math.random() * 2),
                    status: 'Regular'
                },
                contact: {
                    telefones: Math.floor(Math.random() * 3) + 1,
                    emails: Math.floor(Math.random() * 4) + 1,
                    endereco: 'São Paulo, SP',
                    fonte: 'Bases públicas'
                }
            };
        }
        
        function displayResults(data) {
            var html = '';
            
            // Personal
            html += '<div class="result-card"><div class="card-header"><div class="card-icon"><i class="fas fa-user"></i></div><div class="card-title">Informações Pessoais</div><span class="status-badge status-clear">VERIFICADO</span></div>';
            html += '<div class="info-row"><span class="info-label">Nome:</span><span class="info-value">' + data.personal.nome + '</span></div>';
            html += '<div class="info-row"><span class="info-label">CPF:</span><span class="info-value">' + data.personal.cpf + '</span></div>';
            html += '<div class="info-row"><span class="info-label">Nascimento:</span><span class="info-value">' + data.personal.nascimento + '</span></div>';
            html += '<div class="info-row"><span class="info-label">Status:</span><span class="info-value">' + data.personal.situacao + '</span></div></div>';
            
            // Business
            html += '<div class="result-card"><div class="card-header"><div class="card-icon"><i class="fas fa-building"></i></div><div class="card-title">Informações Empresariais</div><span class="status-badge status-warning">ATENÇÃO</span></div>';
            html += '<div class="info-row"><span class="info-label">Razão Social:</span><span class="info-value">' + data.business.razaoSocial + '</span></div>';
            html += '<div class="info-row"><span class="info-label">CNPJ:</span><span class="info-value">' + data.business.cnpj + '</span></div>';
            html += '<div class="info-row"><span class="info-label">Situação:</span><span class="info-value">' + data.business.situacao + '</span></div></div>';
            
            // Financial
            html += '<div class="result-card"><div class="card-header"><div class="card-icon"><i class="fas fa-dollar-sign"></i></div><div class="card-title">Informações Financeiras</div><span class="status-badge status-high-risk">ALTO RISCO</span></div>';
            html += '<div class="info-row"><span class="info-label">Score:</span><span class="info-value">' + data.financial.score + '/1000</span></div>';
            html += '<div class="info-row"><span class="info-label">Restrições:</span><span class="info-value">' + data.financial.restricoes + '</span></div></div>';
            
            // Social
            html += '<div class="result-card"><div class="card-header"><div class="card-icon"><i class="fas fa-hashtag"></i></div><div class="card-title">Redes Sociais</div><span class="status-badge status-clear">LIMPO</span></div>';
            html += '<div class="info-row"><span class="info-label">LinkedIn:</span><span class="info-value">' + data.social.linkedin + '</span></div>';
            html += '<div class="info-row"><span class="info-label">Instagram:</span><span class="info-value">' + data.social.instagram + '</span></div></div>';
            
            // Legal
            html += '<div class="result-card"><div class="card-header"><div class="card-icon"><i class="fas fa-file-alt"></i></div><div class="card-title">Documentos Legais</div><span class="status-badge status-warning">REVISAR</span></div>';
            html += '<div class="info-row"><span class="info-label">Processos:</span><span class="info-value">' + data.legal.processos + '</span></div>';
            html += '<div class="info-row"><span class="info-label">Status:</span><span class="info-value">' + data.legal.status + '</span></div></div>';
            
            // Contact
            html += '<div class="result-card"><div class="card-header"><div class="card-icon"><i class="fas fa-phone"></i></div><div class="card-title">Informações de Contato</div><span class="status-badge status-clear">VERIFICADO</span></div>';
            html += '<div class="info-row"><span class="info-label">Telefones:</span><span class="info-value">' + data.contact.telefones + '</span></div>';
            html += '<div class="info-row"><span class="info-label">Endereço:</span><span class="info-value">' + data.contact.endereco + '</span></div></div>';
            
            document.getElementById('resultsGrid').innerHTML = html;
            
            showRisk();
            showTimeline();
        }
        
        function showRisk() {
            var score = Math.floor(Math.random() * 60) + 20;
            setTimeout(function() {
                document.getElementById('riskFill').style.width = score + '%';
                document.getElementById('riskPercentage').textContent = score + '%';
            }, 500);
            
            var alerts = [];
            if (score > 60) alerts.push('<div class="alert-item alert-high">ALTO RISCO: Múltiplas restrições financeiras</div>');
            if (score > 40) alerts.push('<div class="alert-item alert-medium">MÉDIO RISCO: Processos judiciais em andamento</div>');
            alerts.push('<div class="alert-item alert-low">BAIXO RISCO: Histórico de crédito estável</div>');
            
            document.getElementById('alertList').innerHTML = alerts.join('');
        }
        
        function showTimeline() {
            var events = [
                {date: new Date().toLocaleDateString('pt-BR'), text: 'Busca OSINT realizada - Background Check Pro'},
                {date: '2024-01-15', text: 'Atualização cadastral - Receita Federal'},
                {date: '2023-11-20', text: 'Consulta crédito - Serasa'},
                {date: '2023-09-10', text: 'Verificação documentos - Detran'}
            ];
            
            var html = '';
            for (var i = 0; i < events.length; i++) {
                html += '<div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-content"><div class="timeline-date">' + events[i].date + '</div><div class="timeline-text">' + events[i].text + '</div></div></div>';
            }
            document.getElementById('timelineContent').innerHTML = html;
            document.getElementById('timelineSection').style.display = 'block';
        }
        
        function generateCPF() {
            var b = Math.floor(Math.random() * 1000000000).toString().padStart(9, '0');
            return b.substring(0,3)+'.'+b.substring(3,6)+'.'+b.substring(6,9)+'-'+Math.floor(Math.random()*10)+Math.floor(Math.random()*10);
        }
        
        function generateCNPJ() {
            var b = Math.floor(Math.random() * 1000000000000).toString().padStart(12, '0');
            return b.substring(0,2)+'.'+b.substring(2,5)+'.'+b.substring(5,8)+'/'+b.substring(8,12)+'-'+b.substring(12,14);
        }
        
        console.log('System ready!');
    </script>
</body>
</html>
